name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate BEACON
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Feed health unit tests
        run: npm run test:feed-health

      - name: Briefing log unit tests
        run: npm run test:briefing-log

      - name: Conflict events unit tests
        run: npm run test:conflict-events

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Start server
        env:
          PORT: '3011'
        run: |
          npm run start > /tmp/beacon-next.log 2>&1 &
          echo $! > /tmp/beacon-next.pid

      - name: Smoke test
        env:
          BEACON_BASE_URL: http://127.0.0.1:3011
          SMOKE_TIMEOUT_MS: '45000'
        run: npm run smoke

      - name: Print server log on failure
        if: failure()
        run: |
          cat /tmp/beacon-next.log || true

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/beacon
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max