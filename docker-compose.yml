name: beacon
services:
  beacon:
    # Pulls the prebuilt image from GitHub Container Registry. The `build:`
    # block is kept as a fallback: `docker compose up -d` uses the registry
    # image if present/pullable, otherwise builds locally from the Dockerfile.
    # Run `docker compose pull` to fetch the latest published image.
    image: ghcr.io/andrewleaman-stack/beacon:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beacon
    # Host port is configurable via BEACON_PORT in .env (defaults to 3000).
    ports:
      - "${BEACON_PORT:-3000}:3000"
    # Optional API keys / scanner backend — copy .env.template to .env and
    # fill in what you need. Missing file is ignored (keyless feeds still work).
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.mjs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - default

  beacon-cache:
    image: nginx:alpine
    container_name: beacon-cache
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      - beacon
    restart: unless-stopped
    networks:
      - default

  beacon-intel:
    build:
      context: ./intel
      dockerfile: Dockerfile
    container_name: beacon-intel
    ports:
      - "4000:4000"
    restart: unless-stopped
    networks:
      - default

volumes:
  nginx-cache:

networks:
  default:

# ── CasaOS app-store metadata (ignored by plain Docker Compose) ──
x-casaos:
  architectures:
    - amd64
    - arm64
  main: beacon
  author: andrewleaman-stack
  developer: andrewleaman-stack
  category: Network
  description:
    en_us: >-
      BEACON is a production-grade open-source intelligence & situational awareness
      dashboard. It aggregates real-time global intelligence across aviation,
      maritime, CCTV networks, seismic activity, wildfires, news feeds,
      weather, space weather, cyber threats (CVEs), conflict zones, and local
      RF/P25 feeds into a single GPU-accelerated MapLibre interface. Most features
      work with no API keys.
  tagline:
    en_us: Real-time global intelligence & situational awareness
  title:
    en_us: BEACON
  icon: https://raw.githubusercontent.com/andrewleaman-stack/Beacon/main/public/casaos-icon.png
  thumbnail: https://raw.githubusercontent.com/andrewleaman-stack/Beacon/main/public/og-image.png
  screenshot_link:
    - https://raw.githubusercontent.com/andrewleaman-stack/Beacon/main/public/og-image.png
  scheme: http
  hostname: ""
  port_map: "3000"
  index: /
  webui_port: 3000
  envs:
    - container: SCANNER_URL
      description:
        en_us: "(Optional) RECON scanner backend URL, e.g. http://scanner:7700"
    - container: SCANNER_KEY
      description:
        en_us: "(Optional) RECON scanner shared secret (must match backend BEACON_KEY)."
    - container: FIRMS_API_KEY
      description:
        en_us: "(Optional) NASA FIRMS API key for active-fire data."
    - container: AIS_API_KEY
      description:
        en_us: "(Optional) aisstream.io key for maritime vessel tracking."
    - container: OPENSKY_CLIENT_ID
      description:
        en_us: "(Optional) OpenSky OAuth2 client id for higher aircraft rate limits."
    - container: OPENSKY_CLIENT_SECRET
      description:
        en_us: "(Optional) OpenSky OAuth2 client secret."
    - container: N2YO_API_KEY
      description:
        en_us: "(Optional) N2YO key for satellite tracking."
    - container: OPENMHZ_SYSTEM
      description:
        en_us: "(Optional) OpenMHz system ID for local P25/RF feeds (e.g. mcsdr)."
    - container: BEACON_REDIS_URL
      description:
        en_us: "(Optional) Redis URL for caching and feed state (ioredis)."
    - container: GROQ_API_KEY
      description:
        en_us: "(Optional) Groq API key for AI-driven intelligence briefs."
    - container: OPENROUTER_API_KEY
      description:
        en_us: "(Optional) OpenRouter API key for AI-driven intelligence briefs."
  ports:
    - container: "3000"
      description:
        en_us: "Web UI (HTTP)."